server:
  port: 5000



spring:
  security:
    oauth2:
      client:
        registration:
          auth0:
            client-id: ${TIMELY_AUTH_CLIENT_ID}
            client-secret: ${TIMELY_AUTH_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
        provider:
          auth0:
            # trailing slash is important!
            issuer-uri: ${AUTH_ISSUER_URI}